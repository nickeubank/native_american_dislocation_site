# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://jpanther.github.io/congo/docs/getting-started/

# Update baseURL to match your GitHub Pages URL once the repo is created:
#   https://YOUR_GITHUB_USERNAME.github.io/native_american_dislocation/
baseURL = "https://nativeamericanrepresentation.org/"
theme = "congo"
publishDir = "docs"

defaultContentLanguage = "en"

enableRobotsTXT = true
summaryLength = 0

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[privacy]
  [privacy.vimeo]
    enableDNT = true
  [privacy.x]
    enableDNT = true
  [privacy.youTube]
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true
