{{ define "main" }}
  <article>
    <header class="max-w-prose">
      <h1 class="mb-8 mt-0 text-4xl font-extrabold text-neutral-900 dark:text-neutral">
        {{ .Title | emojify }}
      </h1>
    </header>
    <section class="prose mt-0 max-w-prose dark:prose-invert">
      {{ .Content | emojify }}
    </section>
  </article>
{{ end }}
